name: PR-Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    name: PR-Agent review (Gemini Flash backend)
    steps:
      - name: PR Agent action
        id: pragent
        uses: the-pr-agent/pr-agent@main
        env:
          # Gemini Flash via Google AI Studio free tier.
          # PR-Agent reads GOOGLE_AI_STUDIO.GEMINI_API_KEY from Dynaconf settings,
          # which is populated from env via the double-underscore convention.
          # We also export GEMINI_API_KEY directly for litellm's native fallback.
          GOOGLE_AI_STUDIO__GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Model selection — swap to gemini-3-flash etc. when validated free-tier-eligible.
          CONFIG__MODEL: "gemini/gemini-2.5-flash"
          CONFIG__FALLBACK_MODELS: '["gemini/gemini-1.5-flash"]'
          # Surface configuration in PR reviews so we know what model actually ran
          # — useful while we evaluate this stack over the first few days.
          CONFIG__OUTPUT_RELEVANT_CONFIGURATIONS: "true"
          # Don't review tests-only or docs-only changes by default — keeps the
          # PR-Agent attention on substantive diffs and reduces noise.
          PR_REVIEWER__REQUIRE_TESTS_REVIEW: "true"
          # Capacity: free-tier Gemini Flash has tight limits; we run sequentially.
          PR_DESCRIPTION__PUBLISH_DESCRIPTION_AS_COMMENT: "true"
