# Gemini Code Assist — on-demand second-bot reviewer.
# Different model family from Codex = genuine review redundancy.
# Auto-review on PR open is OFF to avoid noise on trivial diffs;
# summon explicitly with `/gemini review` on non-trivial PRs.
have_fun: false
code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: false
    code_review: false
ignore_patterns: []
